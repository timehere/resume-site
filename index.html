<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>xxx｜AI 应用方向个人简历</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --surface: rgba(255, 255, 255, .82);
      --surface-strong: #ffffff;
      --text: #172033;
      --muted: #657187;
      --line: rgba(31, 42, 68, .12);
      --primary: #2563eb;
      --primary-2: #0f766e;
      --accent: #f59e0b;
      --shadow: 0 18px 50px rgba(27, 39, 71, .11);
      --shadow-soft: 0 8px 24px rgba(27, 39, 71, .08);
      --radius: 18px;
      --radius-sm: 12px;
      --max: 1120px;
    }

    [data-theme="dark"] {
      --bg: #0e1422;
      --surface: rgba(22, 31, 49, .78);
      --surface-strong: #151f31;
      --text: #eef4ff;
      --muted: #9daac1;
      --line: rgba(226, 232, 240, .14);
      --primary: #60a5fa;
      --primary-2: #2dd4bf;
      --accent: #fbbf24;
      --shadow: 0 18px 52px rgba(0, 0, 0, .32);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, .24);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 86px;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, .14), transparent 34rem),
        radial-gradient(circle at 88% 12%, rgba(15, 118, 110, .14), transparent 28rem),
        linear-gradient(135deg, rgba(255,255,255,.12) 0 25%, transparent 25% 50%, rgba(255,255,255,.1) 50% 75%, transparent 75%),
        var(--bg);
      background-size: auto, auto, 36px 36px, auto;
      line-height: 1.65;
    }

    a { color: inherit; text-decoration: none; }
    button, input { font: inherit; }

    .topbar {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      max-width: var(--max);
      margin: 0 auto;
      min-height: 68px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      white-space: nowrap;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: var(--shadow-soft);
      font-size: 15px;
    }

    .navlinks {
      display: flex;
      gap: 4px;
      margin-left: auto;
      align-items: center;
    }

    .navlinks a,
    .icon-btn,
    .btn {
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 13px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
    }

    .navlinks a:hover,
    .icon-btn:hover {
      background: color-mix(in srgb, var(--primary) 9%, transparent);
      color: var(--text);
    }

    .btn {
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 10px 28px color-mix(in srgb, var(--primary) 24%, transparent);
      font-weight: 700;
    }

    .btn.secondary {
      color: var(--text);
      background: var(--surface-strong);
      border-color: var(--line);
      box-shadow: none;
    }

    .btn:hover,
    .card:hover,
    .metric:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      vertical-align: middle;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 104px 22px 54px;
    }

    section { margin: 54px 0; }

    .hero {
      min-height: calc(100vh - 130px);
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, .65fr);
      gap: 28px;
      align-items: center;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(18px);
    }

    .hero-copy {
      padding: clamp(26px, 5vw, 54px);
      position: relative;
      overflow: hidden;
    }

    .hero-copy::after {
      content: "";
      position: absolute;
      right: -90px;
      top: -90px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--primary) 24%, transparent), transparent 66%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary-2);
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 19px);
      max-width: 760px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 82%, transparent);
      color: var(--text);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 700;
    }

    .profile-card {
      padding: 24px;
    }

    .profile-svg {
      width: 100%;
      aspect-ratio: 1.2 / 1;
      border-radius: 16px;
      background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 18%, transparent), color-mix(in srgb, var(--primary-2) 16%, transparent));
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .quick-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .quick-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .quick-item:last-child { border-bottom: 0; }
    .quick-item span:first-child { color: var(--muted); }
    .quick-item span:last-child { font-weight: 800; text-align: right; }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      margin-bottom: 18px;
    }

    .section-title h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      line-height: 1.15;
    }

    .section-title p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .metric {
      padding: 20px;
      border-radius: var(--radius-sm);
      background: var(--surface);
      border: 1px solid var(--line);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .metric span { color: var(--muted); font-size: 14px; }

    .tabs {
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .tablist {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .tab {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      color: var(--muted);
      background: transparent;
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 800;
      transition: background .18s ease, color .18s ease, border-color .18s ease;
    }

    .tab[aria-selected="true"] {
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      border-color: transparent;
      color: white;
    }

    .tabpanel { padding: 22px; }
    .tabpanel[hidden] { display: none; }

    .timeline {
      display: grid;
      gap: 16px;
    }

    .entry {
      position: relative;
      padding: 18px 18px 18px 22px;
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--surface-strong) 72%, transparent);
      border-radius: var(--radius-sm);
    }

    .entry::before {
      content: "";
      position: absolute;
      left: 0;
      top: 18px;
      bottom: 18px;
      width: 4px;
      border-radius: 999px;
      background: linear-gradient(var(--primary), var(--primary-2));
    }

    .entry-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .entry h3,
    .card h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    ul {
      margin: 10px 0 0;
      padding-left: 20px;
      color: var(--muted);
    }

    li { margin: 6px 0; }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      padding: 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--surface);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card p { color: var(--muted); margin: 10px 0 0; }

    .stack {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .mini {
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 999px;
      color: color-mix(in srgb, var(--primary) 82%, var(--text));
      background: color-mix(in srgb, var(--primary) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--primary) 20%, transparent);
      font-weight: 800;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .skill-group h3 {
      margin: 0 0 14px;
      font-size: 17px;
    }

    .skill-row {
      display: grid;
      gap: 6px;
      margin: 13px 0;
    }

    .skill-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--muted) 16%, transparent);
      overflow: hidden;
    }

    .bar i {
      display: block;
      height: 100%;
      width: var(--v);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--primary-2), var(--accent));
    }

    .edu-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
    }

    .footer {
      padding: 34px 22px 48px;
      text-align: center;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    .to-top {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 40;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--surface-strong);
      color: var(--text);
      box-shadow: var(--shadow-soft);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity .18s ease, transform .18s ease;
    }

    .to-top.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .fade {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .45s ease, transform .45s ease;
    }

    .fade.in {
      opacity: 1;
      transform: translateY(0);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(14px);
      padding: 10px 14px;
      border-radius: 999px;
      color: white;
      background: rgba(20, 30, 48, .92);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 90;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .editor-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(10, 16, 28, .48);
      backdrop-filter: blur(10px);
    }

    .editor-backdrop.open {
      display: flex;
    }

    .editor-panel {
      width: min(920px, 100%);
      max-height: min(760px, calc(100vh - 44px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .editor-head,
    .editor-actions {
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .editor-actions {
      border-top: 1px solid var(--line);
      border-bottom: 0;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .editor-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .editor-head p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .editor-body {
      padding: 16px;
      overflow: auto;
    }

    .editor-body textarea {
      width: 100%;
      min-height: 520px;
      resize: vertical;
      padding: 14px;
      color: var(--text);
      background: color-mix(in srgb, var(--bg) 68%, var(--surface-strong));
      border: 1px solid var(--line);
      border-radius: 12px;
      font: 13px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      outline: none;
    }

    .editor-body textarea:focus {
      border-color: color-mix(in srgb, var(--primary) 58%, var(--line));
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 12%, transparent);
    }

    [data-edit] {
      border-radius: 8px;
      outline: 0 solid transparent;
      transition: outline-color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    body.inline-editing [data-edit] {
      cursor: text;
      outline: 1px dashed color-mix(in srgb, var(--primary) 46%, transparent);
      background: color-mix(in srgb, var(--primary) 7%, transparent);
    }

    body.inline-editing [data-edit]:focus {
      outline: 2px solid var(--primary);
      background: color-mix(in srgb, var(--primary) 12%, transparent);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary) 12%, transparent);
    }

    .edit-hint {
      position: fixed;
      left: 50%;
      bottom: 78px;
      z-index: 70;
      transform: translateX(-50%);
      padding: 10px 14px;
      color: white;
      background: rgba(20, 30, 48, .92);
      border-radius: 999px;
      box-shadow: var(--shadow-soft);
      display: none;
      font-size: 13px;
      font-weight: 700;
    }

    body.inline-editing .edit-hint {
      display: block;
    }

    @media (max-width: 920px) {
      .nav { flex-wrap: wrap; min-height: auto; padding: 12px 18px; }
      .navlinks { order: 3; width: 100%; overflow-x: auto; margin-left: 0; padding-bottom: 2px; }
      main { padding-top: 132px; }
      .hero, .edu-grid { grid-template-columns: 1fr; }
      .hero { min-height: auto; }
      .metrics, .skills-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .cards { grid-template-columns: 1fr; }
      .profile-svg { max-height: 280px; }
    }

    @media (max-width: 560px) {
      main { padding-inline: 16px; }
      .metrics, .skills-grid { grid-template-columns: 1fr; }
      .entry-head { display: block; }
      .meta { white-space: normal; margin-top: 4px; }
      .hero-actions .btn { width: 100%; }
      .section-title { display: block; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition: none !important;
        animation: none !important;
      }
      .fade { opacity: 1; transform: none; }
    }

    @media print {
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --surface-strong: #ffffff;
        --text: #111827;
        --muted: #374151;
        --line: #d1d5db;
        --primary: #1d4ed8;
        --primary-2: #0f766e;
      }

      body {
        background: #ffffff !important;
        font-size: 12px;
      }

      .topbar,
      .to-top,
      .toast,
      .editor-backdrop,
      .edit-hint,
      .hero-actions,
      .profile-svg,
      .tablist {
        display: none !important;
      }

      main {
        padding: 0;
        max-width: none;
      }

      section { margin: 18px 0; break-inside: avoid; }
      .hero { display: block; min-height: auto; }
      .panel, .card, .metric, .entry, .tabs {
        box-shadow: none !important;
        border-color: #d1d5db !important;
        break-inside: avoid;
      }

      .hero-copy { padding: 18px; }
      h1 { font-size: 34px; }
      .tabpanel { display: block !important; padding: 12px 0; }
      .tabpanel[hidden] { display: block !important; }
      .cards, .skills-grid, .metrics, .edu-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      a[href]::after { content: ""; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="nav" aria-label="主导航">
      <a class="brand" href="#top" aria-label="返回顶部">
        <span class="avatar" id="brandInitial">简</span>
        <span id="brandName">个人简历</span>
      </a>
      <div class="navlinks" id="navlinks"></div>
      <button class="icon-btn" id="inlineEditBtn" type="button" title="页面编辑模式" aria-label="页面编辑模式">
        <svg class="icon" viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M4 12h10"/><path d="M4 17h7"/><path d="m15 17 2 2 4-4"/></svg>
      </button>
      <button class="icon-btn" id="editBtn" type="button" title="编辑简历数据" aria-label="编辑简历数据">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
      <button class="icon-btn" id="themeBtn" type="button" title="切换深浅色" aria-label="切换深浅色">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 3v2M12 19v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M3 12h2M19 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="4"/></svg>
      </button>
      <button class="icon-btn" id="printBtn" type="button" title="打印 PDF" aria-label="打印 PDF">
        <svg class="icon" viewBox="0 0 24 24"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
      </button>
    </nav>
  </header>

  <main id="top">
    <section class="hero fade" id="hero"></section>
    <section class="fade" id="highlights"></section>
    <section class="fade" id="experience"></section>
    <section class="fade" id="projects"></section>
    <section class="fade" id="skills"></section>
    <section class="fade" id="education"></section>
  </main>

  <footer class="footer" id="footer"></footer>
  <button class="to-top" id="toTop" type="button" aria-label="返回顶部">
    <svg class="icon" viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"/></svg>
  </button>
  <div class="edit-hint" id="editHint">页面编辑已开启：点击虚线区域修改，失焦自动保存</div>
  <div class="editor-backdrop" id="editor" aria-hidden="true">
    <div class="editor-panel" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
      <div class="editor-head">
        <div>
          <h2 id="editorTitle">编辑简历数据</h2>
          <p>修改 JSON 后保存，内容会存到当前浏览器 localStorage。</p>
        </div>
        <button class="icon-btn" id="closeEditor" type="button" aria-label="关闭编辑器">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="editor-body">
        <textarea id="resumeEditor" spellcheck="false" aria-label="简历 JSON 数据"></textarea>
      </div>
      <div class="editor-actions">
        <button class="btn secondary" id="resetResume" type="button">恢复默认</button>
        <button class="btn secondary" id="closeEditor2" type="button">取消</button>
        <button class="btn" id="saveResume" type="button">保存并刷新页面内容</button>

      target[last] = typeof oldValue === "number" ? Number(value) || 0 : value;

        tab.addEventListener("keydown", event => {
          const current = tabs.indexOf(document.activeElement);
          if (event.key === "ArrowRight") {
            event.preventDefault();
            activate((current + 1) % tabs.length);
          }
          if (event.key === "ArrowLeft") {
            event.preventDefault();
            activate((current - 1 + tabs.length) % tabs.length);
          }
          if (event.key === "Home") {
            event.preventDefault();
            activate(0);
          }
          if (event.key === "End") {
            event.preventDefault();
            activate(tabs.length - 1);
          }
        });
      });
    }

    function toast(message) {
      const node = $("#toast");
      node.textContent = message;
      node.classList.add("show");
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => node.classList.remove("show"), 2200);
    }

    function setupTheme() {
      const saved = localStorage.getItem("resume-theme");
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = saved || (prefersDark ? "dark" : "light");
      $("#themeBtn").addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        localStorage.setItem("resume-theme", next);
      });
    }

    function setupScroll() {
      const btn = $("#toTop");
      btn.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
      window.addEventListener("scroll", () => {
        btn.classList.toggle("show", window.scrollY > 460);
      }, { passive: true });

      const io = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add("in");
        });
      }, { threshold: .12 });
      $$(".fade").forEach(node => io.observe(node));
    }

    function renderFooter() {
      $("#footer").innerHTML = "© " + new Date().getFullYear() + " " + resume.name + " · 单页交互简历 · 更新时间 " + resume.updatedAt;
    }

    function renderResumeContent() {
      renderNav();
      renderHero();
      renderHighlights();
      renderExperience();
      renderProjects();
      renderSkills();
      renderEducation();
      renderFooter();
      $$(".fade").forEach(node => node.classList.add("in"));
    }

    function setupEditor() {
      const editor = $("#editor");
      const textarea = $("#resumeEditor");

      function openEditor() {
        textarea.value = JSON.stringify(resume, null, 2);
        editor.classList.add("open");
        editor.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        setTimeout(() => textarea.focus(), 0);
      }

      function closeEditor() {
        editor.classList.remove("open");
        editor.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
      }

      $("#editBtn").addEventListener("click", openEditor);
      $("#closeEditor").addEventListener("click", closeEditor);
      $("#closeEditor2").addEventListener("click", closeEditor);

      editor.addEventListener("click", event => {
        if (event.target === editor) closeEditor();
      });

      document.addEventListener("keydown", event => {
        if (event.key === "Escape" && editor.classList.contains("open")) closeEditor();
      });

      $("#saveResume").addEventListener("click", () => {
        try {
          const nextResume = JSON.parse(textarea.value);
          if (!nextResume || typeof nextResume !== "object" || !nextResume.name) {
            throw new Error("JSON 中至少需要保留 name 字段。");
          }
          resume = nextResume;
          localStorage.setItem(resumeStorageKey, JSON.stringify(resume));
          renderResumeContent();
          closeEditor();
          toast("已保存到当前浏览器");
        } catch (error) {
          toast("保存失败：JSON 格式不正确");
          console.error(error);
        }
      });

      $("#resetResume").addEventListener("click", () => {
        if (!confirm("确定恢复源码里的默认简历内容吗？当前浏览器保存的修改会被清除。")) return;
        localStorage.removeItem(resumeStorageKey);
        resume = clone(defaultResume);
        textarea.value = JSON.stringify(resume, null, 2);
        renderResumeContent();
        toast("已恢复默认内容");
      });
    }

    function setupInlineEditing() {
      let enabled = false;
      const btn = $("#inlineEditBtn");

      function setEditableState() {
        $$("[data-edit]").forEach(node => {
          node.contentEditable = enabled ? "true" : "false";
          node.spellcheck = false;
        });
      }

      function toggleInlineEditing() {
        enabled = !enabled;
        document.body.classList.toggle("inline-editing", enabled);
        btn.style.color = enabled ? "var(--primary)" : "";
        btn.setAttribute("aria-pressed", String(enabled));
        setEditableState();
        toast(enabled ? "页面编辑已开启" : "页面编辑已关闭");
      }

      btn.addEventListener("click", toggleInlineEditing);

      document.addEventListener("focusin", event => {
        const node = event.target.closest && event.target.closest("[data-edit]");
        if (!enabled || !node) return;
        node.dataset.beforeEdit = node.textContent;
      });

      document.addEventListener("keydown", event => {
        const node = event.target.closest && event.target.closest("[data-edit]");
        if (!enabled || !node) return;
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          node.blur();
        }
      });

      document.addEventListener("focusout", event => {
        const node = event.target.closest && event.target.closest("[data-edit]");
        if (!enabled || !node) return;
        const nextValue = node.textContent.trim();
        if (nextValue === node.dataset.beforeEdit) return;
        setByPath(resume, node.dataset.edit, nextValue);
        saveResumeLocal();
        renderResumeContent();
        enabled = true;
        document.body.classList.add("inline-editing");
        btn.style.color = "var(--primary)";
        btn.setAttribute("aria-pressed", "true");
        setEditableState();
        toast("已自动保存");
      });
    }

    function boot() {
      renderResumeContent();
      setupTheme();
      setupScroll();
      setupEditor();
      setupInlineEditing();
      $("#printBtn").addEventListener("click", () => window.print());
    }

    boot();
  </script>
</body>
</html>
